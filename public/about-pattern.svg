<svg xmlns="http://www.w3.org/2000/svg" width="500" height="640" viewBox="0 0 500 640" fill="none">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#278deb" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#278deb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#278deb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <line x1="0" y1="80" x2="500" y2="80" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="500" y2="160" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="500" y2="240" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="320" x2="500" y2="320" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="500" y2="400" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="480" x2="500" y2="480" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="0" y1="560" x2="500" y2="560" stroke="url(#grid-line)" stroke-width="0.5"/>

  <line x1="60" y1="0" x2="60" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="140" y1="0" x2="140" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="220" y1="0" x2="220" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="380" y1="0" x2="380" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>
  <line x1="460" y1="0" x2="460" y2="640" stroke="url(#grid-line)" stroke-width="0.5"/>

  <!-- Glow orbs -->
  <circle cx="250" cy="200" r="180" fill="url(#orb1)"/>
  <circle cx="300" cy="400" r="150" fill="url(#orb2)"/>
  <circle cx="150" cy="500" r="120" fill="url(#orb1)"/>

  <!-- Tech nodes connected -->
  <circle cx="140" cy="160" r="3" fill="#278deb" opacity="0.5"/>
  <circle cx="300" cy="240" r="4" fill="#278deb" opacity="0.4"/>
  <circle cx="220" cy="320" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="380" cy="160" r="3" fill="#278deb" opacity="0.3"/>
  <circle cx="380" cy="400" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="140" cy="480" r="3" fill="#278deb" opacity="0.3"/>
  <circle cx="300" cy="480" r="4" fill="#278deb" opacity="0.35"/>
  <circle cx="460" cy="320" r="3" fill="#ffffff" opacity="0.15"/>

  <line x1="140" y1="160" x2="300" y2="240" stroke="#278deb" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="240" x2="380" y2="160" stroke="#278deb" stroke-width="0.5" opacity="0.15"/>
  <line x1="300" y1="240" x2="220" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <line x1="220" y1="320" x2="380" y2="400" stroke="#278deb" stroke-width="0.5" opacity="0.12"/>
  <line x1="380" y1="400" x2="460" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <line x1="220" y1="320" x2="140" y2="480" stroke="#278deb" stroke-width="0.5" opacity="0.12"/>
  <line x1="140" y1="480" x2="300" y2="480" stroke="#278deb" stroke-width="0.5" opacity="0.15"/>
  <line x1="300" y1="480" x2="380" y2="400" stroke="#278deb" stroke-width="0.5" opacity="0.12"/>

  <!-- Dotted orbit -->
  <circle cx="250" cy="320" r="120" stroke="#278deb" stroke-width="0.5" stroke-dasharray="3 6" fill="none" opacity="0.12"/>
  <circle cx="250" cy="320" r="200" stroke="#ffffff" stroke-width="0.3" stroke-dasharray="2 8" fill="none" opacity="0.06"/>

  <!-- Small accent dots -->
  <circle cx="60" cy="80" r="1.5" fill="#278deb" opacity="0.2"/>
  <circle cx="460" cy="80" r="1.5" fill="#278deb" opacity="0.15"/>
  <circle cx="60" cy="560" r="1.5" fill="#278deb" opacity="0.15"/>
  <circle cx="460" cy="560" r="1.5" fill="#ffffff" opacity="0.1"/>
</svg>