<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#278deb" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#278deb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#278deb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#211cda" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#211cda" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#211cda" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#278deb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#211cda" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="line-grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#278deb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#211cda" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Fade mask: hides everything near the SVG edges -->
    <radialGradient id="edge-fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="65%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fade-mask">
      <rect x="0" y="0" width="600" height="600" fill="url(#edge-fade)"/>
    </mask>
  </defs>

  <g mask="url(#fade-mask)">
    <!-- Glow orbs -->
    <circle cx="350" cy="200" r="200" fill="url(#glow1)"/>
    <circle cx="200" cy="350" r="250" fill="url(#glow2)"/>
    <circle cx="450" cy="400" r="150" fill="url(#glow1)"/>

    <!-- Network lines -->
    <line x1="120" y1="80" x2="280" y2="160" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="280" y1="160" x2="400" y2="120" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="400" y1="120" x2="520" y2="200" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="280" y1="160" x2="320" y2="300" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="320" y1="300" x2="480" y2="340" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="480" y1="340" x2="520" y2="200" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="320" y1="300" x2="200" y2="420" stroke="url(#line-grad2)" stroke-width="1"/>
    <line x1="200" y1="420" x2="350" y2="480" stroke="url(#line-grad2)" stroke-width="1"/>
    <line x1="350" y1="480" x2="480" y2="340" stroke="url(#line-grad2)" stroke-width="1"/>
    <line x1="120" y1="80" x2="80" y2="240" stroke="url(#line-grad2)" stroke-width="1"/>
    <line x1="80" y1="240" x2="200" y2="420" stroke="url(#line-grad2)" stroke-width="1"/>
    <line x1="520" y1="200" x2="550" y2="380" stroke="url(#line-grad)" stroke-width="1"/>
    <line x1="550" y1="380" x2="480" y2="340" stroke="url(#line-grad)" stroke-width="1"/>

    <!-- Network nodes -->
    <circle cx="120" cy="80" r="4" fill="#278deb" opacity="0.6"/>
    <circle cx="280" cy="160" r="6" fill="#278deb" opacity="0.5"/>
    <circle cx="400" cy="120" r="4" fill="#211cda" opacity="0.5"/>
    <circle cx="520" cy="200" r="5" fill="#278deb" opacity="0.4"/>
    <circle cx="320" cy="300" r="7" fill="#211cda" opacity="0.5"/>
    <circle cx="480" cy="340" r="5" fill="#278deb" opacity="0.5"/>
    <circle cx="200" cy="420" r="4" fill="#211cda" opacity="0.4"/>
    <circle cx="350" cy="480" r="5" fill="#278deb" opacity="0.4"/>
    <circle cx="80" cy="240" r="3" fill="#278deb" opacity="0.3"/>
    <circle cx="550" cy="380" r="3" fill="#211cda" opacity="0.3"/>

    <!-- Dotted circles (orbits) -->
    <circle cx="320" cy="300" r="80" stroke="#278deb" stroke-width="0.5" stroke-dasharray="4 6" fill="none" opacity="0.25"/>
    <circle cx="320" cy="300" r="140" stroke="#211cda" stroke-width="0.5" stroke-dasharray="3 8" fill="none" opacity="0.15"/>
    <circle cx="320" cy="300" r="200" stroke="#278deb" stroke-width="0.5" stroke-dasharray="2 10" fill="none" opacity="0.1"/>

    <!-- Small floating dots -->
    <circle cx="150" cy="150" r="2" fill="#278deb" opacity="0.3"/>
    <circle cx="450" cy="250" r="2" fill="#211cda" opacity="0.3"/>
    <circle cx="250" cy="500" r="2" fill="#278deb" opacity="0.2"/>
    <circle cx="500" cy="450" r="2" fill="#211cda" opacity="0.2"/>
    <circle cx="100" cy="350" r="1.5" fill="#278deb" opacity="0.2"/>
    <circle cx="380" cy="50" r="1.5" fill="#211cda" opacity="0.2"/>
  </g>
</svg>